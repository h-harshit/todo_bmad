server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback so client-side routes (/login, /board) work on refresh
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived caching for hashed assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache the entry HTML
    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
