# Default profile = dev (hot-reload, source bind-mounts).
# Production-like profile = prod (multi-stage builds, no source mounts).
#
# Usage:
#   docker-compose --profile dev up      # development (default)
#   docker-compose --profile prod up     # production-like build
#   docker-compose --profile test run --rm backend-test  # run backend tests in container

services:
  backend:
    profiles: ["dev"]
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      DATABASE_URL: sqlite:////data/app.db
      SECRET_KEY: dev-secret-change-me
      FRONTEND_ORIGIN: http://localhost:5173
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  frontend:
    profiles: ["dev"]
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5173/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  backend-prod:
    profiles: ["prod"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: sqlite:////data/app.db
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:8080}
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  frontend-prod:
    profiles: ["prod"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "8080:8080"
    depends_on:
      backend-prod:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3
    restart: unless-stopped

  backend-test:
    profiles: ["test"]
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      DATABASE_URL: "sqlite:///:memory:"
      SECRET_KEY: test-secret
      FRONTEND_ORIGIN: http://localhost:5173
    command: ["python", "-m", "pytest", "tests/", "-v"]

volumes:
  backend_data:
